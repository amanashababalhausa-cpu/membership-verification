<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام التحقق - أمانة الشباب</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      text-align: center; 
      background: #f5f5f5; 
      padding: 20px; 
    }
    .container { 
      max-width: 400px; 
      margin: auto; 
      background: white; 
      padding: 20px; 
      border-radius: 10px; 
      box-shadow: 0 0 10px rgba(0,0,0,0.1); 
    }
    input { 
      width: 100%; 
      padding: 10px; 
      margin: 10px 0; 
      font-size: 18px; 
      text-align: center; 
    }
    button { 
      background: #1a3a6d; 
      color: white; 
      border: none; 
      padding: 12px 25px; 
      font-size: 18px; 
      cursor: pointer; 
      border-radius: 5px; 
    }
    .hidden { display: none; }
    .footer { 
      margin-top: 30px; 
      color: #555; 
      font-weight: bold; 
    }
  </style>
</head>
<body>
  <!-- صفحة التحقق -->
  <div class="container" id="verificationPage">
    <h2>مرحباً بك في نظام التحقق</h2>
    <p>الرجاء إدخال الرمز السري المكون من 4 أرقام</p>
    <input type="password" id="verificationCode" maxlength="4" placeholder="" required>
    <button onclick="verifyCode()">التحقق</button>
    <p id="errorMessage" style="color: red; margin-top: 15px;"></p>
  </div>

  <!-- صفحة الترحيب -->
  <div class="container hidden" id="welcomeMessage">
    <h2 id="greeting"></h2>
    <button onclick="window.location.href='https://forms.gle/LKfwiemMnNXQhi756'">الانتقال إلى النموذج</button>
  </div>

  <div class="footer">حسان صديق عثمان ابكر / مدير مركز المعلومات والتحول الرقمي</div>

  <script>
    // رابط Google Apps Script الخاص بك
    const API_URL = "https://script.google.com/macros/s/AKfycby3yAYrtbvNQnlfOu1Q-dw3VVYCxU9NkuPflfiq5Tua3Qu177tQt3DZraeDse85Rx3vMA/exec";

    function verifyCode() {
      const code = document.getElementById("verificationCode").value;
      const errorElement = document.getElementById("errorMessage");

      if (!code) {
        errorElement.textContent = "الرجاء إدخال الرمز";
        return;
      }

      fetch(`${API_URL}?code=${code}`)
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            document.getElementById("verificationPage").classList.add("hidden");
            document.getElementById("welcomeMessage").classList.remove("hidden");
            document.getElementById("greeting").textContent = `مرحباً ${data.name}!`;
          } else {
            errorElement.textContent = "الرمز السري غير صحيح";
          }
        })
        .catch(() => {
          errorElement.textContent = "خطأ في الاتصال بالخادم";
        });
    }
  </script>
</body>
</html>
